#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,1920x1080,auto,1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = hyprpaper --config ~/.config/hypr/hyprpaper.conf
exec = ~/.config/hypr/resources/waybar-setup
exec-once = waybar --config ~/.config/hypr/waybar/config --style ~/.config/hypr/waybar/style.css
# exec-once = ags
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec = gsettings set org.gnome.desktop.interface icon-theme 'Tokyonight-Dark'
exec-once = hyprctl setcursor 'Bibata-Modern-Classic 24'
exec-once = libinput-gestures-setup restart
exec-once = killall xdg-desktop-por
exec-once = /usr/lib/xdg-desktop-portal-hyprland & # after installing <...>-hyprland-git from AUR
env = TERM, ghostty
env = XDG_CURRENT_DESKTOP,Hyprland
env = GTK_THEME 'Tokyonight-Dark-B'
exec-once = nwg-dock-hyprland -d -i 55
exec-once = emacs --daemon
exec-once = swaync
exec-once = eww daemon
exec-once = eww open-many sys1 sys2 uptime powermenu
exec-once = hypridle
exec-once = wl-paste --watch "$HOME/.config/hypr/resources/clip"

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = # from /usr/share/X11/xkb/rules/base.lst
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    # resize_on_border = on
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 6
    blur {

	    enabled = false
	    # blur = no
	    # blur_size = 3
	    # blur_passes = 1
	    # blur_new_optimizations = off
    }

	shadow {
	    enabled = yes
        range = 4
        render_power = 3
		color = rgba(1a1a1aee)
	}
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.01, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 0%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slidevert # default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = false
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = on
	workspace_swipe_forever = on
}

misc {
    enable_swallow = false
	disable_hyprland_logo = true
    swallow_regex = ^(ghostty)$
    focus_on_activate = true,
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic mouse V1 {
#     sensitivity = -0.5
# }

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
windowrulev2=idleinhibit always,title:(.*)(- YouTube)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = CTRL_SHIFT, Escape, exec, io.missioncenter.MissionCenter
bind = $mainMod, Return, exec, ghostty
bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, Q, exit, 
bind = $mainMod, E, exec, nautilus
bind = $mainMod, T, togglefloating
bind = $mainMod, R, exec, killall rofi || ~/.config/hypr/resources/rofi-launcher # needs rofi-lbonn-wayland-git -> replaces rofi
bind = $mainMod, SPACE, exec, killall rofi || ~/.config/hypr/resources/rofi-launcher-all
bind = $mainMod, slash, exec, killall rofi || ~/.config/hypr/resources/rofi-emoji
# bind = $mainMod, P, pseudo # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, X, exec, killall rofi || ~/.config/hypr/resources/rofi-powermenu
bind = $mainMod, F, fullscreen
bind = $mainMod, D, exec, ~/.config/hypr/resources/dict
bind = $mainMod, Delete, exec, hyprlock
bindr = $mainMod, Escape, exec, hyprctl kill
# bind = $mainMod, A, exec, ags -t quicksettings 
bind = $mainMod, A, exec, eww open --toggle quicksettings
# bind = $mainMod, V, exec, eww open --toggle player
bind = $mainMod, V, exec, ~/.config/hypr/resources/rofi-clipboard
bind = $mainMod, C, exec, killall rofi || ~/.config/hypr/resources/rofi-calc
# bind = $mainMod, N, exec, ags -t datemenu 
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod, grave, exec, kitten quick-access-terminal

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, f, togglefloating
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, r, exec, ~/.config/hypr/resources/waybar-toggle
bind = $mainMod SHIFT, Return, exec, emacsclient -nc -a 'emacs'
bind = $mainMod SHIFT, v, exec, ~/.config/hypr/resources/clip --clear
bind = $mainMod SHIFT, s, exec, ~/.config/hypr/resources/screenshot

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod CTRL, mouse:272, resizewindow
bindle = , XF86AudioRaiseVolume, exec, eww open volumeSlider && pactl set-sink-volume 0 +5% && sleep 5 && eww close volumeSlider
bindle = , XF86AudioLowerVolume, exec, eww open volumeSlider && pactl set-sink-volume 0 -5% && sleep 5 && eww close volumeSlider
bindle = , XF86MonBrightnessUp, exec,  eww open brightSlider && brightnessctl set +5% && sleep 5 && eww close brightSlider
bindle = , XF86MonBrightnessDown, exec, eww open brightSlider && brightnessctl set 5%- && sleep 5 && eww close brightSlider
bindle = , XF86AudioMute, exec, pactl set-sink-mute 0 toggle
bindle = , XF86AudioPlay, exec, playerctl play-pause
bindle = , XF86AudioNext, exec, playerctl next
bindle = , XF86AudioPrev, exec, playerctl previous
bindle = , Print, exec, ~/.config/hypr/resources/screenshot
bind = $mainMod, Print, exec, ~/.config/hypr/resources/screenshot --edit
bind = SHIFT, Print, exec, ~/.config/hypr/resources/screenshot --full-screen

# Special workspace / scratchpad
bind = SUPER SHIFT, TAB, movetoworkspace, special
bind = SUPER, TAB, togglespecialworkspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, S, movetoworkspace, +0
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, S, movetoworkspace, special:magic
bind = $mainMod, S, togglespecialworkspace, magic
bind = ALT, TAB, exec, ags -t overview

# Lock screen on lid close, Unlock on lid open
bindl = , switch:Lid Switch, exec, hyprlock
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/resources/lidclose
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/resources/lidopen

# Passthrough
bind = $mainMod SHIFT, Escape, submap, passthrough
  submap = passthrough
bind = $mainMod SHIFT, Escape, submap, reset
  submap = reset
