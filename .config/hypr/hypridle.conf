general {
	lock_cmd = pidof hyprlock || hyprlock
}

listener {
	timeout = 30
	on-timeout = brightnessctl set 5%
	on-resume = brightnessctl set 10%
}

listener {
    timeout = 300                                              # 5 mins
    on-timeout = hyprlock                                      
    on-resume = notify-send "Welcome back!" -i ~/.config/hypr/resources/archlinux.svg
}

listener {
    timeout = 600                                              # 10 mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}